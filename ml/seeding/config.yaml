# ─── Base Entity Counts ───
base_users: 1000
base_personal_contexts: 1000  # one per user
base_group_contexts: 200
members_per_group_min: 2
members_per_group_max: 8

# ─── Category Distribution (must sum to 100) ───
category_weights:
  Food & Dining: 35
  Transportation: 15
  Groceries: 12
  Shopping: 10
  Utilities: 8
  Rent & Housing: 7
  Entertainment: 5
  Health & Medical: 4
  Education: 2
  Travel: 1
  Personal Care: 0.5
  Others: 0.5

# ─── Amount Distribution (BDT) ───
# Uses log-normal: mu = ln(mean), sigma = 0.5
amount_distribution:
  Food & Dining:
    mean: 450
    min: 15
    max: 5000
  Transportation:
    mean: 200
    min: 10
    max: 3000
  Groceries:
    mean: 1500
    min: 50
    max: 15000
  Shopping:
    mean: 2500
    min: 50
    max: 50000
  Utilities:
    mean: 3000
    min: 100
    max: 15000
  Rent & Housing:
    mean: 15000
    min: 1000
    max: 80000
  Entertainment:
    mean: 800
    min: 20
    max: 10000
  Health & Medical:
    mean: 1200
    min: 50
    max: 100000
  Education:
    mean: 5000
    min: 200
    max: 200000
  Travel:
    mean: 8000
    min: 300
    max: 150000
  Personal Care:
    mean: 400
    min: 20
    max: 3000
  Others:
    mean: 500
    min: 10
    max: 10000

# ─── Split Type Distribution ───
split_distribution:
  personal:
    none: 100
  group_2:
    none: 30
    equal: 50
    custom: 20
  group_3plus:
    none: 20
    equal: 50
    custom: 20
    percentage: 10

# ─── Budget Category Weights (must sum to 100) ───
budget_weights:
  Food & Dining: 25
  Transportation: 15
  Groceries: 12
  Shopping: 10
  Utilities: 10
  Rent & Housing: 8
  Entertainment: 7
  Health & Medical: 5
  Education: 3
  Travel: 3
  Personal Care: 1.5
  Others: 0.5

# ─── Hourly Distribution (weights, 0-23) ───
hourly_weights:
  0: 1
  1: 1
  2: 0.5
  3: 0.5
  4: 0.5
  5: 0.5
  6: 2
  7: 3
  8: 5
  9: 6
  10: 8
  11: 8
  12: 6
  13: 5
  14: 4
  15: 4
  16: 5
  17: 6
  18: 7
  19: 9
  20: 8
  21: 4
  22: 3
  23: 3

# ─── Temporal Distribution ───
date_range_months: 24

day_of_week_weights:
  Monday: 1.0
  Tuesday: 0.9
  Wednesday: 0.9
  Thursday: 1.0
  Friday: 1.8
  Saturday: 1.6
  Sunday: 1.1

month_period_weights:
  month_end_25_31: 1.5
  month_begin_1_7: 1.3
  mid_month_10_20: 1.0

seasonal_periods:
  # ── Islamic festivals ──
  - name: "Eid-ul-Fitr"
    start_month: 3
    start_day: 20
    end_month: 4
    end_day: 10
    weight: 2.5
    religion: islam
  - name: "Eid-ul-Adha"
    start_month: 6
    start_day: 1
    end_month: 7
    end_day: 15
    weight: 2.0
    religion: islam
  # ── Hindu festivals ──
  - name: "Durga Puja"
    start_month: 9
    start_day: 25
    end_month: 10
    end_day: 12
    weight: 2.2
    religion: hindu
    categories_boost:
      Shopping: 3.5
      Food & Dining: 2.0
      Travel: 2.5
      Entertainment: 2.0
  - name: "Kali Puja / Diwali"
    start_month: 10
    start_day: 20
    end_month: 11
    end_day: 5
    weight: 1.8
    religion: hindu
    categories_boost:
      Shopping: 2.5
      Food & Dining: 1.8
      Groceries: 1.5
  # ── Buddhist festivals ──
  - name: "Buddha Purnima"
    start_month: 5
    start_day: 18
    end_month: 5
    end_day: 25
    weight: 1.5
    religion: buddhist
    categories_boost:
      Others: 3.0    # donations
      Food & Dining: 1.5
      Travel: 1.5
  # ── Christian festivals ──
  - name: "Christmas"
    start_month: 12
    start_day: 20
    end_month: 12
    end_day: 31
    weight: 2.0
    religion: christian
    categories_boost:
      Shopping: 3.0
      Food & Dining: 2.5
      Entertainment: 2.0
      Others: 1.5
  - name: "Easter"
    start_month: 3
    start_day: 28
    end_month: 4
    end_day: 10
    weight: 1.3
    religion: christian
    categories_boost:
      Food & Dining: 1.8
      Others: 1.5
  # ─── Cultural / secular ───
  - name: "Pohela Boishakh"
    start_month: 4
    start_day: 10
    end_month: 4
    end_day: 18
    weight: 1.8
  - name: "Winter"
    start_month: 11
    start_day: 1
    end_month: 2
    end_day: 28
    weight: 1.2
  - name: "Monsoon"
    start_month: 6
    start_day: 1
    end_month: 9
    end_day: 30
    weight: 0.8

# ─── Note Realism Factors ───
note_realism:
  typo_chance: 0.05
  short_form_chance: 0.10
  null_chance: 0.03
  empty_chance: 0.02
  bangla_chance: 0.08
  amount_in_note_chance: 0.15
  person_ref_chance: 0.12
  date_ref_chance: 0.05

# ─── Other Probabilities ───
is_settled_chance: 0.85
soft_delete_chance: 0.01

